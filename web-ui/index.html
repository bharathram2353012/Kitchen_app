<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0c;
      --surface: #1a1814;
      --surface2: #242018;
      --border: #2e2a22;
      --accent: #f5a623;
      --accent2: #e8431a;
      --green: #4caf7d;
      --red: #e8431a;
      --yellow: #f5a623;
      --blue: #4a9eff;
      --text: #f0ebe0;
      --text-muted: #7a7060;
      --text-dim: #4a4438;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .header {
      position: relative;
      padding: 40px 48px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1;
    }

    .header-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .header-left h1 span {
      color: var(--accent);
    }

    .header-left p {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(76, 175, 125, 0.1);
      border: 1px solid rgba(76, 175, 125, 0.3);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--green);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 48px;
    }

    /* Stats Bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.total::before { background: var(--blue); }
    .stat-card.pending::before { background: var(--yellow); }
    .stat-card.preparing::before { background: var(--accent2); }
    .stat-card.ready::before { background: var(--green); }

    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    /* Order Input */
    .order-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 40px;
    }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .dish-select {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .dish-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
    }

    .dish-select option { background: var(--surface2); }

    .dish-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .dish-input::placeholder { color: var(--text-dim); }

    .dish-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
    }

    .submit-btn {
      background: var(--accent);
      color: #0f0e0c;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .submit-btn:hover { background: #f0b84a; }
    .submit-btn:active { transform: scale(0.97); }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--text-dim);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Orders Grid */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
    }

    .filter-tab {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0e0c;
    }

    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: cardIn 0.3s ease forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .order-card:hover {
      transform: translateY(-2px);
      border-color: #3a3428;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .order-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .order-id {
      font-size: 0.72rem;
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-pending {
      background: rgba(245, 166, 35, 0.12);
      color: var(--yellow);
      border: 1px solid rgba(245, 166, 35, 0.25);
    }

    .status-preparing {
      background: rgba(232, 67, 26, 0.12);
      color: var(--accent2);
      border: 1px solid rgba(232, 67, 26, 0.25);
    }

    .status-ready {
      background: rgba(76, 175, 125, 0.12);
      color: var(--green);
      border: 1px solid rgba(76, 175, 125, 0.25);
    }

    .status-delivered {
      background: rgba(74, 158, 255, 0.12);
      color: var(--blue);
      border: 1px solid rgba(74, 158, 255, 0.25);
    }

    .order-dish {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .order-emoji {
      font-size: 1.5rem;
      margin-bottom: 10px;
      display: block;
    }

    .order-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .order-time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .status-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .status-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      grid-column: 1/-1;
    }

    .empty-state .big-emoji { font-size: 3rem; margin-bottom: 16px; display: block; }
    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 0.85rem; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 0.85rem;
      color: var(--text);
      z-index: 100;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 300px;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: var(--red); }

    /* Loading */
    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 768px) {
      .header, .main { padding: 24px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .form-row { flex-direction: column; }
      .header { flex-direction: column; gap: 16px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🍳 Kitchen <span>Orders</span></h1>
    <p>Live Order Management System</p>
  </div>
  <div class="live-badge">
    <span class="live-dot"></span>
    Live
  </div>
</div>

<div class="main">

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card total">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="stat-pending">0</div>
    </div>
    <div class="stat-card preparing">
      <div class="stat-label">Preparing</div>
      <div class="stat-value" id="stat-preparing">0</div>
    </div>
    <div class="stat-card ready">
      <div class="stat-label">Ready</div>
      <div class="stat-value" id="stat-ready">0</div>
    </div>
  </div>

  <!-- Order Form -->
  <div class="order-form">
    <div class="form-title">Place New Order</div>
    <div class="form-row">
      <select class="dish-select" id="dish-select">
        <option value="">— Pick a dish —</option>
        <optgroup label="🍛 South Indian">
          <option value="Masala Dosai">🫓 Masala Dosai</option>
          <option value="Idli Sambar">🍚 Idli Sambar</option>
          <option value="Pongal">🥣 Pongal</option>
          <option value="Vada">🍩 Vada</option>
          <option value="Uttapam">🥞 Uttapam</option>
        </optgroup>
        <optgroup label="🍲 Mains">
          <option value="Paneer Tikka">🧀 Paneer Tikka</option>
          <option value="Chicken Biryani">🍗 Chicken Biryani</option>
          <option value="Dal Tadka">🥘 Dal Tadka</option>
          <option value="Palak Paneer">🥬 Palak Paneer</option>
          <option value="Mutton Curry">🍖 Mutton Curry</option>
        </optgroup>
        <optgroup label="🥗 Starters">
          <option value="Gobi Manchurian">🥦 Gobi Manchurian</option>
          <option value="Chicken 65">🍗 Chicken 65</option>
          <option value="Onion Pakoda">🧅 Onion Pakoda</option>
        </optgroup>
      </select>
      <button class="submit-btn" onclick="placeOrder('select')">Order Now</button>
    </div>
    <div class="or-divider">or type your own</div>
    <div class="form-row">
      <input class="dish-input" id="dish-input" type="text" placeholder="Type custom dish name..." />
      <button class="submit-btn" onclick="placeOrder('input')">Order Now</button>
    </div>
  </div>

  <!-- Orders List -->
  <div class="section-header">
    <div class="section-title">All Orders</div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
        <button class="filter-tab" onclick="setFilter('pending', this)">Pending</button>
        <button class="filter-tab" onclick="setFilter('preparing', this)">Preparing</button>
        <button class="filter-tab" onclick="setFilter('ready', this)">Ready</button>
      </div>
      <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
    </div>
  </div>

  <div class="orders-grid" id="orders-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = "http://localhost:3000";
  let allOrders = [];
  let currentFilter = 'all';

  const DISH_EMOJIS = {
    'Masala Dosai': '🫓', 'Idli Sambar': '🍚', 'Pongal': '🥣',
    'Vada': '🍩', 'Uttapam': '🥞', 'Paneer Tikka': '🧀',
    'Chicken Biryani': '🍗', 'Dal Tadka': '🥘', 'Palak Paneer': '🥬',
    'Mutton Curry': '🍖', 'Gobi Manchurian': '🥦', 'Chicken 65': '🍗',
    'Onion Pakoda': '🧅'
  };

  const STATUS_NEXT = {
    'pending': 'preparing',
    'preparing': 'ready',
    'ready': 'delivered'
  };

  function getEmoji(dish) {
    return DISH_EMOJIS[dish] || '🍽️';
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  function updateStats(orders) {
    document.getElementById('stat-total').textContent = orders.length;
    document.getElementById('stat-pending').textContent = orders.filter(o => o.status === 'pending').length;
    document.getElementById('stat-preparing').textContent = orders.filter(o => o.status === 'preparing').length;
    document.getElementById('stat-ready').textContent = orders.filter(o => o.status === 'ready').length;
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  }

  function renderOrders() {
    const grid = document.getElementById('orders-grid');
    const filtered = currentFilter === 'all'
      ? allOrders
      : allOrders.filter(o => o.status === currentFilter);

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <span class="big-emoji">🫙</span>
          <h3>No orders yet</h3>
          <p>Place an order above to get started</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.slice().reverse().map((order, i) => {
      const next = STATUS_NEXT[order.status];
      const time = order.createdAt
        ? new Date(order.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        : 'Just now';

      return `
      <div class="order-card" style="animation-delay:${i * 0.05}s">
        <div class="order-card-top">
          <div class="order-id">Order #${order.id}</div>
          <span class="status-badge status-${order.status}">${order.status}</span>
        </div>
        <span class="order-emoji">${getEmoji(order.dish)}</span>
        <div class="order-dish">${order.dish}</div>
        <div class="order-meta">
          <span class="order-time">🕐 ${time}</span>
          ${next ? `<button class="status-btn" onclick="advanceStatus(${order.id}, '${next}')">→ Mark ${next}</button>` : '<span style="font-size:0.75rem;color:var(--blue)">✓ Delivered</span>'}
        </div>
      </div>`;
    }).join('');
  }

  async function loadOrders() {
    try {
      const res = await fetch(`${API}/orders`);
      allOrders = await res.json();
      updateStats(allOrders);
      renderOrders();
    } catch (e) {
      showToast('⚠️ Could not connect to API', true);
    }
  }

  async function placeOrder(source) {
    let dish = '';
    if (source === 'select') {
      dish = document.getElementById('dish-select').value;
    } else {
      dish = document.getElementById('dish-input').value.trim();
    }

    if (!dish) {
      showToast('Please select or type a dish name!', true);
      return;
    }

    try {
      const res = await fetch(`${API}/orders`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dish })
      });
      const order = await res.json();
      allOrders.push(order);
      updateStats(allOrders);
      renderOrders();
      document.getElementById('dish-select').value = '';
      document.getElementById('dish-input').value = '';
      showToast(`✅ Order placed: ${dish}`);
    } catch (e) {
      showToast('⚠️ Failed to place order', true);
    }
  }

  async function advanceStatus(id, newStatus) {
    try {
      // Try PATCH endpoint first
      const res = await fetch(`${API}/orders/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });

      if (res.ok) {
        const updated = await res.json();
        allOrders = allOrders.map(o => o.id === id ? updated : o);
      } else {
        // Fallback: update locally if API doesn't support PATCH
        allOrders = allOrders.map(o => o.id === id ? { ...o, status: newStatus } : o);
      }

      updateStats(allOrders);
      renderOrders();
      showToast(`Order #${id} → ${newStatus}`);
    } catch (e) {
      // Fallback: update locally
      allOrders = allOrders.map(o => o.id === id ? { ...o, status: newStatus } : o);
      updateStats(allOrders);
      renderOrders();
    }
  }

  // Auto-refresh every 15 seconds
  loadOrders();
  setInterval(loadOrders, 15000);
</script>
</body>
</html>
