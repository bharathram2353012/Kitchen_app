apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-db
  namespace: kitchen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-db
  template:
    metadata:
      labels:
        app: kitchen-db
    spec:
      containers:
      - name: mongo
        image: mongo:7.0
        ports:
        - containerPort: 27017